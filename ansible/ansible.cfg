[defaults]
inventory = inventory.ini
host_key_checking = False
retry_files_enabled = False
# 'default' is always available; the 'yaml' stdout callback was moved out of
# ansible-core into community.general, so it errors on the older ansible that
# old control hosts (Python 3.7 -> ansible-core 2.11) are capped at.
stdout_callback = default
# Honored by ansible-core >= 2.13 for YAML-style task output; ignored by older.
result_format = yaml
roles_path = roles
interpreter_python = auto_silent
timeout = 30

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=120s -o ServerAliveInterval=30
