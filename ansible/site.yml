---
# Configure the RHEL host and bring up a single-node minikube cluster.
- name: Configure swa-demo host and minikube
  hosts: swa_host
  become: true
  gather_facts: true

  vars:
    minikube_user: "{{ ansible_user | default('ec2-user') }}"

  # Tools install to /usr/local/bin, which isn't on the non-login shell PATH that
  # Ansible's command/shell modules use on RHEL. Put it on PATH for every task so
  # kubectl/helm/minikube are found.
  environment:
    PATH: "/usr/local/bin:{{ ansible_env.PATH | default('/usr/sbin:/usr/bin:/sbin:/bin') }}"

  roles:
    - role: common
      tags: [common]
    - role: kubectl_helm
      tags: [tools]
    - role: minikube
      tags: [minikube]
    - role: swa_images
      tags: [images]
    - role: swa_agent_prereqs
      tags: [swa]
    - role: swa_tooling
      tags: [tooling]
