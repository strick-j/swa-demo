---
# Install minikube and start a single-node cluster as the (non-root) login user.
# The docker driver must NOT run as root, so cluster tasks use become_user.

- name: Install minikube binary
  ansible.builtin.get_url:
    url: "https://storage.googleapis.com/minikube/releases/{{ minikube_version }}/minikube-linux-amd64"
    dest: /usr/local/bin/minikube
    mode: "0755"
    owner: root
    group: root

- name: Check minikube status
  ansible.builtin.command: minikube status --format '{{ "{{" }}.Host{{ "}}" }}'
  become: true
  become_user: "{{ minikube_user }}"
  register: mk_status
  failed_when: false
  changed_when: false
  environment:
    MINIKUBE_HOME: "/home/{{ minikube_user }}/.minikube"

- name: Start minikube (docker driver)
  ansible.builtin.command: >-
    minikube start
    --driver=docker
    --kubernetes-version={{ minikube_k8s_version }}
    --cpus={{ minikube_cpus }}
    --memory={{ minikube_memory }}
    --addons={{ minikube_addons | join(',') }}
  become: true
  become_user: "{{ minikube_user }}"
  register: mk_start
  changed_when: "'Done!' in mk_start.stdout or 'Starting' in mk_start.stdout"
  when: mk_status.stdout != "Running"
  environment:
    MINIKUBE_HOME: "/home/{{ minikube_user }}/.minikube"

- name: Wait for the node to be Ready
  ansible.builtin.command: kubectl wait --for=condition=Ready node --all --timeout=180s
  become: true
  become_user: "{{ minikube_user }}"
  register: node_ready
  changed_when: false
  retries: 3
  delay: 10
  until: node_ready.rc == 0

- name: Show cluster info
  ansible.builtin.command: kubectl get nodes -o wide
  become: true
  become_user: "{{ minikube_user }}"
  changed_when: false
  register: nodes_out

- name: Report nodes
  ansible.builtin.debug:
    var: nodes_out.stdout_lines
