---
# Install kubectl and helm system-wide.

- name: Install kubectl
  ansible.builtin.get_url:
    url: "https://dl.k8s.io/release/{{ kubectl_version }}/bin/linux/amd64/kubectl"
    dest: /usr/local/bin/kubectl
    mode: "0755"
    owner: root
    group: root

# Install helm by extracting the release tarball directly. The official
# get-helm-3 script verifies helm is on $PATH after install and exits non-zero
# when /usr/local/bin isn't on the (non-login) shell PATH, even though the binary
# installed fine — so we avoid it.
- name: Check whether helm is installed
  ansible.builtin.command: /usr/local/bin/helm version --short
  register: helm_check
  failed_when: false
  changed_when: false

- name: Download and extract helm
  ansible.builtin.unarchive:
    src: "https://get.helm.sh/helm-{{ helm_version }}-linux-amd64.tar.gz"
    dest: /tmp
    remote_src: true
  when: helm_check.rc != 0

- name: Install helm binary into /usr/local/bin
  ansible.builtin.copy:
    src: /tmp/linux-amd64/helm
    dest: /usr/local/bin/helm
    mode: "0755"
    owner: root
    group: root
    remote_src: true
  when: helm_check.rc != 0
