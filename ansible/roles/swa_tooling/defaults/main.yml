---
# Terraform + cyberark/swa provider + charts + Conjur authn-iam config on the host
# so terraform-swa can run on the host using the instance-profile IAM role.

terraform_version: "1.9.8"

# Bundle (charts, provider, install script) synced from the same S3 prefix as the
# images. Upload the whole swa-release bundle there; images stay as *.tar.
images_s3_uri: ""
aws_region: "us-east-1"
bundle_local_dir: "/home/{{ minikube_user }}/swa-bundle"
project_stage_dir: "/home/{{ minikube_user }}/swa-demo"

# Conjur AWS IAM authentication (authn-iam) for conjur-api-go (the swa provider).
conjur_appliance_url: ""                 # https://<sub>.secretsmgr.cyberark.cloud/api
conjur_account: "conjur"
conjur_service_id: "default"             # conjur/authn-iam/<service_id>
conjur_host_id: ""                       # host/data/<aws-account-id>/<role-name>
conjurrc_path: "/home/{{ minikube_user }}/.conjurrc"
conjur_env_file: "/home/{{ minikube_user }}/.swa-conjur.env"
