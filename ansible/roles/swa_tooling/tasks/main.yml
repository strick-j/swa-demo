---
# Vendor the SWA Helm charts onto the TARGET host (deploy-swa.sh Helm-installs
# them here). The target pulls from S3 with its own access. Terraform, the SWA
# provider, and Conjur authn-iam config live on the CONTROL host instead
# (scripts/control-setup.sh), since that host's role is enrolled in Conjur.

- name: Vendor SWA charts onto the target
  when: images_s3_uri | default('') | length > 0
  block:
    - name: Sync SWA helm charts from S3 (target instance-profile auth)
      ansible.builtin.command: >-
        /usr/local/bin/aws s3 sync {{ images_s3_uri }} {{ bundle_local_dir }}
        --exclude "*" --include "*.tgz"
      environment:
        AWS_DEFAULT_REGION: "{{ aws_region }}"
      become_user: "{{ minikube_user }}"
      register: charts_sync
      changed_when: "'download:' in charts_sync.stdout"

    - name: Ensure helm/charts dir exists in the staged project
      ansible.builtin.file:
        path: "{{ project_stage_dir }}/helm/charts"
        state: directory
        owner: "{{ minikube_user }}"
        group: "{{ minikube_user }}"
        mode: "0755"

    - name: Find synced chart packages
      ansible.builtin.find:
        paths: "{{ bundle_local_dir }}"
        patterns: "*.tgz"
        recurse: true # bundle keeps charts under helm/
      register: chart_pkgs

    - name: Fail if no charts were found
      ansible.builtin.fail:
        msg: "No *.tgz charts found under {{ images_s3_uri }} (upload the bundle's helm/*.tgz)."
      when: chart_pkgs.matched | int == 0

    - name: Vendor charts into the staged project
      ansible.builtin.copy:
        src: "{{ item.path }}"
        dest: "{{ project_stage_dir }}/helm/charts/"
        remote_src: true
        owner: "{{ minikube_user }}"
        group: "{{ minikube_user }}"
        mode: "0644"
      loop: "{{ chart_pkgs.files }}"
      loop_control:
        label: "{{ item.path | basename }}"

- name: Note when chart vendoring is skipped
  ansible.builtin.debug:
    msg: "images_s3_uri not set; skipping chart vendoring (set SWA_IMAGES_S3_URI)."
  when: images_s3_uri | default('') | length == 0
